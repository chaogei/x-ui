name: Release X-ui
on:
  push:
    tags:
      - 'v*'
      - '1.*'
  workflow_dispatch:

env:
  SINGBOX_VERSION: "1.11.0"
  GO_VERSION: "1.22"
  # 构建标志：
  #  -trimpath      去除本地路径信息，便于复现构建
  #  -s -w          去除符号表与 DWARF 调试信息，减小二进制体积
  #  -buildid=      清空 buildid，保证可复现
  BUILD_FLAGS: "-trimpath"
  LD_FLAGS: "-s -w -buildid="

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            cc: ""
            apt: ""
          - arch: arm64
            goarch: arm64
            cc: "aarch64-linux-gnu-gcc"
            apt: "gcc-aarch64-linux-gnu"
          - arch: s390x
            goarch: s390x
            cc: "s390x-linux-gnu-gcc"
            apt: "gcc-s390x-linux-gnu"
    name: build x-ui ${{ matrix.arch }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compile toolchain
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Build x-ui
        run: |
          set -euo pipefail
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.goarch }}
          if [ -n "${{ matrix.cc }}" ]; then
            export CC=${{ matrix.cc }}
          fi
          go build ${BUILD_FLAGS} -ldflags="${LD_FLAGS}" -o xui-release -v main.go

      - name: Package release tarball
        run: |
          set -euo pipefail
          mkdir x-ui
          mv xui-release x-ui/x-ui
          cp x-ui.service x-ui/x-ui.service
          cp x-ui.sh x-ui/x-ui.sh
          mkdir x-ui/bin
          SB_FILE="sing-box-${SINGBOX_VERSION}-linux-${{ matrix.arch }}"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/${SB_FILE}.tar.gz"
          tar -xzf "${SB_FILE}.tar.gz"
          mv "${SB_FILE}/sing-box" "x-ui/bin/sing-box-linux-${{ matrix.arch }}"
          chmod +x "x-ui/bin/sing-box-linux-${{ matrix.arch }}" x-ui/x-ui x-ui/x-ui.sh
          rm -rf "${SB_FILE}" "${SB_FILE}.tar.gz"
          tar -zcvf "x-ui-linux-${{ matrix.arch }}.tar.gz" x-ui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x-ui-linux-${{ matrix.arch }}
          path: x-ui-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: true
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
